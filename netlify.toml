[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION = "10"
  NEXT_TELEMETRY_DISABLED = "1"

# 2026-05-21 — CS 채널 통합 (5/19 D-day). 채널톡 → cs.lalaloop.app으로 변경
[[redirects]]
  from = "/29"
  to = "https://cs.lalaloop.app/"
  status = 301
  force = true

# SPA-style fallback for client routes (정적 export — index.html 폴백)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/site/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
