[build]
  command = "npm run build"
  publish = "out"

[build.environment]
  NODE_VERSION = "22"
  NPM_VERSION = "10"
  NEXT_TELEMETRY_DISABLED = "1"

# 채널톡 홈으로 단축 URL 포워딩 (force=true로 정적 파일보다 우선)
[[redirects]]
  from = "/29"
  to = "https://oysterable.channel.io/home"
  status = 301
  force = true

# SPA-style fallback for client routes (정적 export — index.html 폴백)
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

[[headers]]
  for = "/_next/static/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/site/*"
  [headers.values]
    Cache-Control = "public, max-age=86400"
